<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinTrack RLS - Etapa 7</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:24px;max-width:900px}
    h1{font-size:24px;margin-bottom:8px}
    p{color:#444}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0}
    input,button{padding:10px 12px;font-size:14px}
    input{min-width:260px}
    button{cursor:pointer}
    pre{background:#111;color:#eee;padding:14px;border-radius:8px;overflow:auto;white-space:pre-wrap}
    .ok{color:#0a7a28}
    .warn{color:#a15c00}
  </style>
</head>
<body>
  <h1>Teste da Etapa 7 - Supabase Auth + RLS</h1>
  <p>Este arquivo testa login, leitura da tabela <code>transactions</code> com usuário autenticado e depois sem sessão.</p>

  <div class="row">
    <input id="email" type="email" placeholder="Seu email" />
    <input id="password" type="password" placeholder="Sua senha" />
  </div>

  <div class="row">
    <button id="loginBtn">1) Login</button>
    <button id="queryBtn">2) Query transactions</button>
    <button id="logoutBtn">3) Logout</button>
    <button id="queryAnonBtn">4) Query sem sessão</button>
    <button id="sessionBtn">Ver sessão</button>
  </div>

  <pre id="output">Pronto para testar.</pre>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2.98.0";

    const SUPABASE_URL = "https://wkiytjwuztnytygpxooe.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndraXl0and1enRueXR5Z3B4b29lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyODc3NzUsImV4cCI6MjA4Nzg2Mzc3NX0.Z3fyYRDobzarCEdqkobTjQQd1J9HAUR2CCdnBbLC0QA";

    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const out = document.getElementById("output");

    function show(obj){
      out.textContent = typeof obj === "string" ? obj : JSON.stringify(obj, null, 2);
      console.log(obj);
    }

    async function login(){
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      if(!email || !password){
        show("Preencha email e senha.");
        return;
      }
      const res = await sb.auth.signInWithPassword({ email, password });
      show(res);
    }

    async function queryTransactions(){
      const { data, error } = await sb
        .from("transactions")
        .select("*")
        .limit(5);
      show({ data, error });
    }

    async function logout(){
      const res = await sb.auth.signOut();
      show(res);
    }

    async function queryWithoutSession(){
      await sb.auth.signOut();
      const { data, error } = await sb
        .from("transactions")
        .select("*")
        .limit(5);
      show({
        note: "Resultado esperado após RLS: vazio ou erro de permissão, dependendo das policies.",
        data, error
      });
    }

    async function showSession(){
      const res = await sb.auth.getSession();
      show(res);
    }

    document.getElementById("loginBtn").onclick = login;
    document.getElementById("queryBtn").onclick = queryTransactions;
    document.getElementById("logoutBtn").onclick = logout;
    document.getElementById("queryAnonBtn").onclick = queryWithoutSession;
    document.getElementById("sessionBtn").onclick = showSession;
  </script>
</body>
</html>
